
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction Form</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>Placement Prediction Form</h2>

<form action="/predict" method="POST">

<label>CGPA</label>
<input type="number" step="0.01" name="cgpa" required>

<label>Programming Skill (0-100)</label>
<input type="number" name="programming" required>

<label>Communication Skill (0-100)</label>
<input type="number" name="communication" required>

<label>Projects Completed</label>
<input type="number" name="projects" required>

<label>Internships</label>
<input type="number" name="internships" required>

<label>Attendance (%)</label>
<input type="number" name="attendance" required>

<button type="submit">
Predict Placement
</button>

</form>

</div>

</body>
</html>
